server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:h2:mem:authdb}
    driverClassName: org.h2.Driver
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:password}
  
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

jwt:
  # In production, ALWAYS pass this via environment variables!
  secret: ${JWT_SECRET:YOUR_DEFAULT_DEV_SECRET_KEY_MAKE_IT_AT_LEAST_256_BITS_LONG}
  expiration: ${JWT_EXPIRATION:86400000} # 1 day in milliseconds
